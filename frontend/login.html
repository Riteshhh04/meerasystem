<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Ledger Login</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Manrope',sans-serif;
}

body{

background:linear-gradient(135deg,#faf6f7,#f5ecef);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}


/* Decorative circles */

body::before{

content:"";

position:absolute;

width:500px;

height:500px;

background:#d97a91;

border-radius:50%;

top:-200px;

left:-150px;

opacity:.12;

}

body::after{

content:"";

position:absolute;

width:450px;

height:450px;

background:#b8536b;

border-radius:50%;

bottom:-180px;

right:-150px;

opacity:.10;

}

.container{

width:1100px;

height:650px;

background:#fff;

border-radius:22px;

display:flex;

overflow:hidden;

box-shadow:0 25px 60px rgba(0,0,0,.12);

z-index:5;

}

/* LEFT */

.left{

width:50%;

background:linear-gradient(160deg,#b8536b,#d97a91);

padding:70px;

display:flex;

flex-direction:column;

justify-content:center;

color:white;

}

.logo{

width:90px;

height:90px;

background:white;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

margin-bottom:30px;

}

.left h1{

font-size:46px;

font-family:'Cormorant Garamond',serif;

margin-bottom:10px;

}

.left h3{

font-weight:500;

margin-bottom:30px;

opacity:.95;

letter-spacing:1px;

}

.left p{

line-height:1.8;

font-size:15px;

opacity:.9;

}


/* RIGHT */

.right{

width:50%;

padding:70px;

display:flex;

flex-direction:column;

justify-content:center;

}

.right h2{

font-size:40px;

font-family:'Cormorant Garamond',serif;

margin-bottom:10px;

color:#28242a;

}

.subtitle{

color:#777;

margin-bottom:40px;

}

.input-group{

margin-bottom:22px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-size:14px;

color:#555;

}

.input-group input{

width:100%;

padding:15px;

border:1px solid #ecdde1;

border-radius:10px;

font-size:15px;

outline:none;

transition:.3s;

}

.input-group input:focus{

border-color:#b8536b;

box-shadow:0 0 8px rgba(184,83,107,.2);

}

.password-box{

position:relative;

}

.password-box span{

position:absolute;

right:18px;

top:17px;

cursor:pointer;

font-size:14px;

color:#b8536b;

}

.options{

display:flex;

justify-content:space-between;

margin-bottom:30px;

font-size:14px;

}

.options a{

text-decoration:none;

color:#b8536b;

}

.login-btn{

width:100%;

padding:16px;

border:none;

background:#b8536b;

color:white;

font-size:16px;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

.login-btn:hover{

background:#d97a91;

transform:translateY(-2px);

}

.footer{

margin-top:30px;

text-align:center;

font-size:13px;

color:#888;

}

@media(max-width:900px){

.container{

flex-direction:column;

height:auto;

width:95%;

}

.left,.right{

width:100%;

padding:50px 30px;

}

.left{

text-align:center;

align-items:center;

}

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="logo">
🌸
</div>

<h1>Meeraa Savla</h1>

<h3>Studio Ledger</h3>

<p>

Manage artworks, clients, invoices, payments,

production, staff and studio finances from one elegant dashboard.

</p>

</div>

<div class="right">

<h2>Welcome Back</h2>

<p class="subtitle">

Login to continue to your dashboard

</p>

<form action="dashboard.html">

<div class="input-group">

<label>Email Address</label>

<input type="email"

placeholder="Enter your email"

required>

</div>

<div class="input-group">

<label>Password</label>

<div class="password-box">

<input

type="password"

id="password"

placeholder="Enter your password"

required>

<span onclick="togglePassword()">👁</span>

</div>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">Forgot Password?</a>

</div>

<button class="login-btn">

Sign In

</button>

<div class="footer">

© 2026 Meeraa Savla Studio Ledger

</div>

</form>

</div>

</div>

<script>

function togglePassword(){

let pass=document.getElementById("password");

if(pass.type==="password"){

pass.type="text";

}else{

pass.type="password";

}

}

</script>

</body>
</html>
