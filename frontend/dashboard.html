<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handcrafted by Meeraa Savla — Studio Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* professional white studio palette — rose & blush botanicals, neutral text */
  --void:#faf6f7;          /* page background — soft blush white */
  --surface:#ffffff;       /* surface — card face */
  --surface-2:#fdfafa;     /* surface-2 — sidebar / modal */
  --surface-3:#f6eef0;     /* surface-3 — recessed / input fields */
  --line:#ecdde1;          /* border */
  --line-soft:#f2e6e9;
  --amber:#b8536b;         /* primary accent — deep rose */
  --amber-bright:#d97a91;  /* bright accent — buttons, highlights */
  --rose:#e3aab3;          /* secondary accent — soft blush */
  --rose-deep:#9c5f68;
  --sage:#8a9182;          /* tertiary accent — dried foliage, used sparingly */
  --ink:#28242a;           /* neutral near-black — no brown */
  --ink-dim:#6b6570;
  --ink-faint:#9a93a0;
  --ok:#3f8f5f;
  --warn:#b9822f;
  --danger:#af4a3d;
  --info:#3d7a94;
  --radius:10px;
  --shadow: 0 16px 36px rgba(60,25,40,0.14);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:
    radial-gradient(1100px 550px at 88% -8%, rgba(217,122,145,0.06), transparent 62%),
    radial-gradient(900px 520px at -8% 108%, rgba(156,95,104,0.04), transparent 60%),
    var(--void);
  background-attachment:fixed;
  color:var(--ink);
  font-family:'Manrope',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.app{ position:relative; z-index:1; display:flex; min-height:100vh; }
::selection{ background:rgba(217,122,145,0.22); }
h1,h2,h3,.display{ font-family:'Cormorant Garamond',serif; letter-spacing:0.01em; font-weight:600; }


/* ---------- SIDEBAR ---------- */
.sidebar{
  width:246px; flex:none;
  background:
    radial-gradient(220px 160px at 20% 8%, rgba(217,122,145,0.06), transparent 70%),
    linear-gradient(180deg,#fdfafa,#f7eef0);
  border-right:1px solid var(--line-soft); display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.brand{ padding:22px 20px 19px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line-soft);}
.resin-mark{ width:32px; height:32px; flex:none; filter:drop-shadow(0 2px 5px rgba(184,83,107,0.2)); }
.resin-mark .mark-glow{ transform-origin:17px 17px; }
.brand-text .name{ font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; line-height:1.15; }
.brand-text .sub{ font-size:10px; color:var(--amber); letter-spacing:0.18em; text-transform:uppercase; margin-top:3px; }

.nav{ padding:16px 10px; flex:1; }
.nav-group-label{ font-size:9.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-faint); padding:15px 12px 6px; font-family:'JetBrains Mono',monospace; }
.nav-item{
  display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:7px; cursor:pointer;
  color:var(--ink-dim); font-size:13.5px; font-weight:500; margin-bottom:2px; transition:background .15s,color .15s;
  user-select:none; position:relative;
}
.nav-item:hover{ background:rgba(184,83,107,0.06); color:var(--ink); }
.nav-item.active{ background:linear-gradient(90deg,rgba(184,83,107,0.09),transparent); color:var(--amber-bright); }
.nav-item.active::before{ content:''; position:absolute; left:0; top:8px; bottom:8px; width:2px; background:linear-gradient(180deg,var(--rose),var(--amber)); border-radius:2px; }
.nav-icon{ width:16px; text-align:center; font-size:14px; opacity:0.9; }
.nav-count{ margin-left:auto; font-size:10px; color:var(--ink-faint); background:var(--surface-3); border:1px solid var(--line-soft); padding:1px 6px; border-radius:20px; font-family:'JetBrains Mono',monospace; }
.nav-item.active .nav-count{ color:var(--amber); border-color:rgba(184,83,107,0.3); }

.sidebar-foot{ padding:15px 18px; border-top:1px solid var(--line-soft); font-size:10.5px; color:var(--ink-faint); font-style:italic; }

/* ---------- TOPBAR ---------- */
.main{ flex:1; min-width:0; display:flex; flex-direction:column; }
.topbar{
  height:64px; flex:none; display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; border-bottom:1px solid var(--line-soft); position:sticky; top:0;
  background:rgba(255,255,255,0.86); backdrop-filter:blur(10px); z-index:20;
}
.topbar .title-wrap .eyebrow{ font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--amber); font-family:'JetBrains Mono',monospace; }
.topbar .title-wrap h1{ font-size:20px; margin:2px 0 0; font-weight:700; }
.topbar-actions{ display:flex; align-items:center; gap:10px; }
.search-box{
  display:flex; align-items:center; gap:8px; background:var(--surface-3); border:1px solid var(--line-soft);
  padding:7px 12px; border-radius:8px; width:220px;
}
.search-box input{ background:none; border:none; outline:none; color:var(--ink); font-size:13px; width:100%; font-family:'Manrope',sans-serif; }
.search-box input::placeholder{ color:var(--ink-faint); }
.btn{
  border:1px solid var(--line); background:var(--surface-2); color:var(--ink); font-size:13px; font-weight:600;
  padding:8px 14px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:7px;
  transition:all .15s; font-family:'Manrope',sans-serif;
}
.btn:hover{ background:var(--surface); border-color:var(--rose-deep); }
.btn-gold{ background:linear-gradient(160deg,var(--amber-bright),var(--amber)); color:#ffffff; border:none; font-weight:700; box-shadow:0 4px 14px rgba(184,83,107,0.22); }
.btn-gold:hover{ filter:brightness(1.08); }
.btn-danger-outline{ border-color:rgba(175,74,61,0.4); color:var(--danger); background:transparent; }
.btn-danger-outline:hover{ background:rgba(175,74,61,0.1); }
.btn-ghost{ background:none; border:none; color:var(--ink-dim); }
.btn-ghost:hover{ color:var(--ink); background:var(--surface-2); }
.btn-sm{ padding:5px 9px; font-size:12px; border-radius:6px; }

.content{ padding:26px 28px 60px; }
.view{ display:none; }
.view.active{ display:block; }

/* ---------- CARDS / METRICS — poured-resin surfaces with glass sheen ---------- */
.grid{ display:grid; gap:16px; }
.grid-4{ grid-template-columns:repeat(4,1fr); }
.grid-3{ grid-template-columns:repeat(3,1fr); }
.grid-2{ grid-template-columns:repeat(2,1fr); }
@media(max-width:1200px){ .grid-4{grid-template-columns:repeat(2,1fr);} }

.metric-card{
  background:var(--surface);
  border:1px solid var(--line-soft); border-radius:var(--radius); padding:19px 20px;
  position:relative; overflow:hidden;
  box-shadow: 0 6px 18px rgba(60,45,25,0.07);
}
.metric-card::before{ content:''; position:absolute; top:0; left:0; width:100%; height:2px; background:linear-gradient(90deg,var(--rose),var(--amber),transparent); z-index:2; }
.metric-card .m-label{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-faint); font-family:'JetBrains Mono',monospace; }
.metric-card .m-value{ font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700; margin-top:9px; color:var(--ink); }
.metric-card .m-sub{ font-size:12px; color:var(--ink-dim); margin-top:6px; }
.metric-card .m-sub.up{ color:var(--ok); }
.metric-card .m-sub.down{ color:var(--danger); }

.panel{
  background:var(--surface);
  border:1px solid var(--line-soft); border-radius:var(--radius); padding:20px 22px; margin-bottom:16px;
  position:relative; overflow:hidden; box-shadow: 0 6px 18px rgba(60,45,25,0.06);
}
.panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:15px; padding-bottom:12px; border-bottom:1px solid var(--line-soft); position:relative; z-index:1; }
.panel-head h3{ font-size:16px; font-weight:700; margin:0; letter-spacing:0.01em; }
.panel-head .link{ font-size:12px; color:var(--amber-bright); cursor:pointer; font-family:'JetBrains Mono',monospace; }
.panel > *{ position:relative; z-index:1; }

/* ---------- TABLE ---------- */
.table-wrap{ overflow-x:auto; }
table.data{ width:100%; border-collapse:collapse; font-size:13px; }
table.data th{
  text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--amber);
  padding:9px 12px; border-bottom:1px solid var(--line); font-weight:600; white-space:nowrap; font-family:'JetBrains Mono',monospace;
}
table.data td{ padding:11px 12px; border-bottom:1px solid var(--line-soft); color:var(--ink); vertical-align:middle; white-space:nowrap; }
table.data tr:hover td{ background:rgba(184,83,107,0.05); }
table.data td.wrap{ white-space:normal; max-width:260px; }
.row-actions{ display:flex; gap:6px; }
.icon-btn{ width:26px; height:26px; border-radius:6px; border:1px solid var(--line-soft); background:var(--surface-3); color:var(--ink-dim); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; font-size:12px; }
.icon-btn:hover{ color:var(--ink); border-color:var(--rose-deep); }

.badge{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px; letter-spacing:0.01em; white-space:nowrap; }
.badge::before{ content:''; width:6px; height:6px; border-radius:50%; background:currentColor; }
.badge-success{ background:rgba(63,143,95,0.14); color:var(--ok); }
.badge-warning{ background:rgba(185,130,47,0.16); color:var(--warn); }
.badge-danger{ background:rgba(175,74,61,0.16); color:var(--danger); }
.badge-info{ background:rgba(61,122,148,0.16); color:var(--info); }
.badge-neutral{ background:rgba(107,101,112,0.10); color:var(--ink-dim); }

.progress-track{ width:90px; height:6px; background:var(--surface-3); border-radius:6px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:8px; box-shadow:inset 0 1px 2px rgba(60,45,25,0.12); }
.progress-fill{ height:100%; background:linear-gradient(90deg,var(--rose-deep),var(--amber-bright)); }

.empty-state{ text-align:center; padding:52px 20px; color:var(--ink-faint); }
.empty-state .glyph{ font-size:28px; color:var(--rose-deep); margin-bottom:11px; }
.empty-state .msg{ font-size:13.5px; margin-bottom:16px; }

/* ---------- TOOLBAR ---------- */
.toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap; }
.toolbar-left{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
select.filter, .search-box.small{ font-size:12.5px; }
select.filter{
  background:var(--surface-3); border:1px solid var(--line-soft); color:var(--ink-dim); padding:7px 10px;
  border-radius:8px; outline:none; font-family:'Manrope',sans-serif;
}

/* ---------- MODAL ---------- */
.modal-overlay{ position:fixed; inset:0; background:rgba(10,7,3,0.65); backdrop-filter:blur(3px); display:none; align-items:flex-start; justify-content:center; z-index:100; padding:40px 20px; overflow-y:auto; }
.modal-overlay.active{ display:flex; }
.modal{ background:var(--surface-2); border:1px solid var(--line); border-radius:13px; width:100%; max-width:520px; box-shadow:var(--shadow); }
.modal-head{ padding:18px 22px; border-bottom:1px solid var(--line-soft); display:flex; align-items:center; justify-content:space-between; }
.modal-head h3{ margin:0; font-size:16.5px; }
.modal-body{ padding:20px 22px; display:grid; gap:14px; max-height:65vh; overflow-y:auto; }
.field label{ display:block; font-size:10.5px; color:var(--amber); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; font-family:'JetBrains Mono',monospace; }
.field input, .field select, .field textarea{
  width:100%; background:var(--surface-3); border:1px solid var(--line-soft); color:var(--ink); padding:9px 11px;
  border-radius:8px; font-size:13.5px; outline:none; font-family:'Manrope',sans-serif; transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--amber); }
.field textarea{ min-height:70px; resize:vertical; }
.modal-foot{ padding:16px 22px; border-top:1px solid var(--line-soft); display:flex; justify-content:flex-end; gap:10px; }

/* ---------- KANBAN ---------- */
.kanban{ display:flex; gap:14px; overflow-x:auto; padding-bottom:10px; align-items:flex-start; }
.kanban-col{
  background:var(--surface);
  border:1px solid var(--line-soft); border-radius:var(--radius); width:270px; flex:none;
  box-shadow: 0 6px 16px rgba(60,45,25,0.06);
}
.kanban-col-head{ padding:12px 14px; border-bottom:1px solid var(--line-soft); display:flex; align-items:center; justify-content:space-between; }
.kanban-col-head .dot{ width:8px; height:8px; border-radius:50%; margin-right:8px; }
.kanban-col-head span.count{ font-size:11px; color:var(--ink-faint); background:var(--surface-3); padding:1px 7px; border-radius:20px; font-family:'JetBrains Mono',monospace; }
.kanban-body{ padding:10px; display:flex; flex-direction:column; gap:9px; min-height:60px; }
.task-card{ background:var(--surface-3); border:1px solid var(--line-soft); border-radius:8px; padding:11px 12px; cursor:grab; }
.task-card:active{ cursor:grabbing; }
.task-card.dragging{ opacity:0.4; }
.task-card .t-title{ font-size:13px; font-weight:600; margin-bottom:6px; }
.task-card .t-meta{ display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--ink-faint); }
.kanban-col.drag-over{ border-color:var(--amber); }

/* ---------- ANALYTICS BARS ---------- */
.bar-row{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.bar-label{ width:130px; font-size:12px; color:var(--ink-dim); flex:none; }
.bar-track{ flex:1; height:9px; background:var(--surface-3); border-radius:5px; overflow:hidden; box-shadow:inset 0 1px 2px rgba(60,45,25,0.12); }
.bar-fill{ height:100%; background:linear-gradient(90deg,var(--rose-deep),var(--amber-bright)); }
.bar-value{ width:74px; text-align:right; font-size:12px; color:var(--ink-faint); flex:none; font-family:'JetBrains Mono',monospace; }

.pill-row{ display:flex; gap:8px; flex-wrap:wrap; }
.text-faint{ color:var(--ink-faint); font-size:12.5px; }
.mono{ font-family:'JetBrains Mono',monospace; }

/* ---------- PAYROLL INPUTS ---------- */
input.pay-inp{
  width:110px; background:var(--surface-3); border:1px solid var(--line-soft); color:var(--ink);
  padding:7px 9px; border-radius:7px; font-size:13px; outline:none; font-family:'JetBrains Mono',monospace; transition:border-color .15s;
}
input.pay-inp:focus{ border-color:var(--amber); }
input.pay-inp:disabled{ background:transparent; border-color:transparent; color:var(--ink-dim); opacity:0.75; }
.btn:disabled{ opacity:0.45; cursor:not-allowed; }

/* ---------- TOAST ---------- */
.toast{
  position:fixed; left:50%; bottom:28px; transform:translate(-50%, 20px);
  background:var(--ink); color:#fff; font-size:13px; font-weight:600; padding:11px 20px; border-radius:10px;
  box-shadow:0 12px 34px rgba(40,20,30,0.32); z-index:400; opacity:0; pointer-events:none;
  transition:opacity .2s, transform .2s; max-width:88vw; text-align:center;
}
.toast.show{ opacity:1; transform:translate(-50%, 0); }
.toast::before{ content:'✓'; color:var(--rose); margin-right:8px; font-weight:700; }

@media(max-width:880px){
  /* Show the toggle button */
  #menuToggle { display: inline-flex !important; }
  
  /* Update sidebar to be a toggleable overlay instead of 'display: none' */
  .sidebar { 
    display: none; 
    position: fixed; 
    left: 0; 
    top: 0; 
    z-index: 1000; 
    box-shadow: var(--shadow); 
  }
  .sidebar.active { display: flex; }
  
  .grid-4,.grid-3,.grid-2{ grid-template-columns:1fr; }
}

/* ---------- INVOICE DOCUMENT (printable) ---------- */
.invoice-overlay{ position:fixed; inset:0; background:rgba(10,7,3,0.78); z-index:200; display:none; align-items:flex-start; justify-content:center; padding:36px 20px; overflow-y:auto; }
.invoice-overlay.active{ display:flex; }
.invoice-doc-wrap{ width:100%; max-width:720px; }
.invoice-doc-actions{ display:flex; justify-content:flex-end; gap:10px; margin-bottom:12px; }
.invoice-doc{
  background:#faf6f6; color:#2a2228; border-radius:8px; padding:46px 50px;
  box-shadow:0 24px 60px rgba(0,0,0,0.5); font-family:'Manrope',sans-serif; position:relative;
}
.invoice-doc::before{ content:''; position:absolute; top:0; left:0; right:0; height:5px; border-radius:8px 8px 0 0; background:linear-gradient(90deg,#e3aab3,#b8536b); }
.inv-head{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px; padding-top:6px; }
.inv-brand{ display:flex; align-items:center; gap:11px; }
.inv-brand-name{ font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:700; color:#7a3347; }
.inv-brand-sub{ font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:#a15f6c; margin-top:2px; }
.inv-title{ font-family:'Cormorant Garamond',serif; font-size:15px; letter-spacing:0.16em; color:#7a3347; border:1px solid #7a3347; padding:6px 14px; border-radius:4px; height:fit-content; }
.inv-meta-row{ display:flex; justify-content:space-between; gap:20px; margin-bottom:26px; padding-bottom:20px; border-bottom:1px solid #ecdde0; }
.inv-label{ font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:#a15f6c; font-family:'JetBrains Mono',monospace; display:block; margin-bottom:3px; }
.inv-strong{ font-size:14px; font-weight:700; color:#2a2228; }
.inv-dim{ font-size:12.5px; color:#7a6672; margin-top:2px; }
.inv-meta-right{ text-align:right; font-size:12.5px; display:grid; gap:5px; }
.inv-meta-right .inv-label{ display:inline; margin-right:5px; }
table.inv-table{ width:100%; border-collapse:collapse; margin-bottom:22px; font-size:13px; }
table.inv-table thead th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:#a15f6c; padding:8px 0; border-bottom:2px solid #7a3347; font-family:'JetBrains Mono',monospace; }
table.inv-table tbody td{ padding:10px 0; border-bottom:1px solid #f0e2e4; }
table.inv-table tfoot td{ padding:7px 0; }
table.inv-table tfoot tr.inv-total-row td{ font-weight:700; font-size:15px; border-top:2px solid #7a3347; padding-top:10px; color:#7a3347; }
.inv-notes{ margin-bottom:24px; font-size:12.5px; color:#4a3c40; }
.inv-notes .inv-label{ margin-bottom:4px; }
.inv-footer{ display:flex; justify-content:space-between; align-items:flex-end; margin-top:34px; padding-top:18px; border-top:1px solid #ecdde0; }
.inv-sign{ font-size:12px; color:#2a2228; font-weight:600; }
.inv-thanks{ font-size:11.5px; font-style:italic; color:#a15f6c; }

@media print{
  body *{ visibility:hidden; }
  .invoice-doc, .invoice-doc *{ visibility:visible; }
  .invoice-doc{ position:absolute; top:0; left:0; width:100%; box-shadow:none; border-radius:0; }
  .no-print{ display:none !important; }
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <svg class="resin-mark" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="resinGrad" cx="35%" cy="30%" r="78%">
            <stop offset="0%" stop-color="#fff5f6" stop-opacity="0.95"/>
            <stop offset="20%" stop-color="var(--amber-bright)"/>
            <stop offset="55%" stop-color="var(--amber)"/>
            <stop offset="100%" stop-color="var(--rose-deep)"/>
          </radialGradient>
        </defs>
        <circle cx="17" cy="17" r="15.5" fill="url(#resinGrad)" stroke="var(--line)" stroke-width="1"/>
        <g transform="translate(17,17)">
          <ellipse cx="0" cy="-5.2" rx="2.6" ry="3.7" fill="var(--rose)" opacity="0.92" transform="rotate(0)"/>
          <ellipse cx="0" cy="-5.2" rx="2.6" ry="3.7" fill="var(--rose)" opacity="0.92" transform="rotate(72)"/>
          <ellipse cx="0" cy="-5.2" rx="2.6" ry="3.7" fill="var(--rose)" opacity="0.92" transform="rotate(144)"/>
          <ellipse cx="0" cy="-5.2" rx="2.6" ry="3.7" fill="var(--rose)" opacity="0.92" transform="rotate(216)"/>
          <ellipse cx="0" cy="-5.2" rx="2.6" ry="3.7" fill="var(--rose)" opacity="0.92" transform="rotate(288)"/>
          <circle class="mark-glow" cx="0" cy="0" r="2" fill="var(--amber-bright)"/>
        </g>
      </svg>
      <div class="brand-text">
        <div class="name">Meeraa Savla</div>
        <div class="sub">Studio Ledger</div>
      </div>
    </div>
    <nav class="nav" id="navContainer"></nav>
    <div class="sidebar-foot">Poured in resin, pressed with care.</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="btn btn-ghost" onclick="toggleSidebar()" id="menuToggle" style="display:none; margin-right: 10px;">☰</button>
      
      <div class="title-wrap">
        <div class="eyebrow" id="topEyebrow">Overview</div>
        <h1 id="topTitle">Dashboard</h1>
      </div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content" id="content"></div>
</div>

const TASK_COLUMNS = ['Concept','Curing','Completed','Delivered'];

let DB = {}; // moduleKey -> array of records
let TASKS = []; // separate, kanban-shaped (production board)

const STORAGE_KEYS = Object.keys(MODULES).reduce((acc,k)=>{acc[k]='msr_'+k; return acc;},{});
STORAGE_KEYS.tasks = 'msr_tasks';
STORAGE_KEYS.salaries = 'msr_salaries';
let SALARIES = [];        // salary/payroll records: {id, staffId, staffName, month, base, bonus, deductions, net, status, paidDate, mode, notes}
let payrollMonth = null;  // 'YYYY-MM' selected in the payroll view

async function storeGet(key){
  try{
    const r = await window.storage.get(key,false);
    return r ? JSON.parse(r.value) : [];
  }catch(e){ return []; }
}
async function storeSet(key,val){
  try{ await window.storage.set(key, JSON.stringify(val), false); }catch(e){ console.error('storage set failed',key,e); }
}

async function loadAll(){

    // 1. Loop through standard modules only
    for(const key of Object.keys(MODULES)){

        if(key === "clients"){
            const response = await fetch("/api/clients");
            DB.clients = await response.json();
        }
        else if(key === "artworks"){
            const response = await fetch("/api/artworks");
            DB.artworks = await response.json();
        }
        else if(key === "staff"){
            const response = await fetch("/api/staff");
            DB.staff = await response.json();
        }
        else if(key === "advances"){
            const response = await fetch("/api/advances");
            DB.advances = await response.json();
        }
        else if(key === "expenses"){
            const response = await fetch("/api/expenses");
            DB.expenses = await response.json();
        }
        else if(key === "bills"){
            const response = await fetch("/api/bills");
            DB.bills = await response.json();
        }
        else if(key === "meetings"){
            const response = await fetch("/api/meetings");
            DB.meetings = await response.json();
        }
        else if(key === "invoices"){
            const response = await fetch("/api/invoices");
            DB.invoices = await response.json();
        }
        else if(key === "payments"){
            const response = await fetch("/api/payments");
            DB.payments = await response.json();
        }
        else{
            DB[key] = await storeGet(STORAGE_KEYS[key]);
        }
    }

    // 2. Fetch Payroll OUTSIDE the loop
    try {
        const response = await fetch("/api/payroll");
        DB.payroll = await response.json();
    } catch (err) {
        console.error("Failed to fetch payroll", err);
        DB.payroll = [];
    }

    // 3. Map final variables
    TASKS = await storeGet(STORAGE_KEYS.tasks);
    SALARIES = DB.payroll || [];

}

function persist(moduleKey){
  if(moduleKey==='tasks'){ storeSet(STORAGE_KEYS.tasks, TASKS); }
  else if(moduleKey==='salaries'){ storeSet(STORAGE_KEYS.salaries, SALARIES); }
  else { storeSet(STORAGE_KEYS[moduleKey], DB[moduleKey]); }
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtMoney(n){ n = Number(n)||0; return '₹'+n.toLocaleString('en-IN'); }
function fmtDate(date){

    if(!date) return '—';

    return new Date(date).toLocaleDateString('en-CA');

}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function currentMonthKey(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

/* ---------------- NAV ---------------- */
function renderNav(){
  const groups = {};
  groups['Overview'] = [{key:'dashboard',label:'Dashboard',icon:'◈'}];
  groups['Delivery_pre'] = [{key:'tasks',label:'Production Board',icon:'☰'}];
  for(const [key,mod] of Object.entries(MODULES)){
    groups[mod.group] = groups[mod.group]||[];
    groups[mod.group].push({key,label:mod.label,icon:mod.icon});
  }
  groups['Team'] = groups['Team'] || [];
  groups['Team'].push({key:'payroll',label:'Payroll',icon:'₹'});
  groups['Insights'] = [{key:'analytics',label:'Analytics',icon:'◫'},{key:'ledger',label:'Cash Book',icon:'▥'}];
  groups['System'] = [{key:'backup',label:'Backup & Restore',icon:'⤓'}];

  const order = ['Overview','Portfolio','Delivery_pre','CRM','Finance','Operations','Team','Insights','System'];
  const labelMap = {Overview:'Overview',Portfolio:'Portfolio','Delivery_pre':'Production',CRM:'Clients',Finance:'Finance',Operations:'Operations',Team:'Team',Insights:'Insights',System:'System'};

  let html = '';
  const seen = new Set();
  order.forEach(groupKey=>{
    if(!groups[groupKey]) return;
    const label = labelMap[groupKey];
    if(label && !seen.has(label)){ html += `<div class="nav-group-label">${label}</div>`; seen.add(label); }
    groups[groupKey].forEach(item=>{
      const count = ['dashboard','analytics','ledger','payroll','backup'].includes(item.key) ? '' :
        `<span class="nav-count">${item.key==='tasks'?TASKS.length:(DB[item.key]||[]).length}</span>`;
      html += `<div class="nav-item ${currentView===item.key?'active':''}" data-view="${item.key}">
        <span class="nav-icon">${item.icon}</span><span>${item.label}</span>${count}
      </div>`;
    });
  });
  document.getElementById('navContainer').innerHTML = html;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.addEventListener('click',()=>setView(el.dataset.view));
  });
}

function setView(view){
  currentView = view;
  renderNav();
  renderTopbar();
  renderContent();
}

function renderTopbar(){

    dashboard:['Overview','Dashboard'],
    tasks:['Production','Production Board'],
    analytics:['Insights','Analytics'],
    ledger:['Insights','Cash Book'],
    payroll:['Team','Payroll Run'],
    backup:['System','Backup & Restore'],
  };
  let eyebrow, title;
  if(titles[currentView]){ [eyebrow,title] = titles[currentView]; }
  else { eyebrow = MODULES[currentView].group; title = MODULES[currentView].label; }
  document.getElementById('topEyebrow').textContent = eyebrow;
  document.getElementById('topTitle').textContent = title;

  const actions = document.getElementById('topbarActions');
  if(MODULES[currentView]){
    actions.innerHTML = `<button class="btn btn-gold" onclick="openModal('${currentView}')">+ Add ${MODULES[currentView].label.replace(/s$/,'')}</button>`;
  } else if(currentView==='tasks'){
    actions.innerHTML = `<button class="btn btn-gold" onclick="openModal('artworks')">+ Add Artwork</button>`;
  } else {
    actions.innerHTML = '';
  }
}

/* ---------------- GENERIC MODULE TABLE VIEW ---------------- */
function renderModuleView(moduleKey){
  const mod = MODULES[moduleKey];
  const state = searchState[moduleKey] = searchState[moduleKey] || {q:'', filter:''};
  let records = DB[moduleKey] || [];

  const filterField = mod.fields.find(f=>f.type==='select' && mod.tableCols.includes(f.key));

  if(state.q){
    const q = state.q.toLowerCase();
    records = records.filter(r => mod.fields.some(f => (''+(r[f.key]||'')).toLowerCase().includes(q)));
  }
  if(state.filter && filterField){
    records = records.filter(r => r[filterField.key]===state.filter);
  }

  let filterHtml = '';
  if(filterField){
    filterHtml = `<select class="filter" onchange="setModuleFilter('${moduleKey}',this.value)">
      <option value="">All ${filterField.label}</option>
      ${fieldOptions(filterField).map(o=>`<option value="${o}" ${state.filter===o?'selected':''}>${o}</option>`).join('')}
    </select>`;
  }

  let exportHtml = mod.exportable ? `<button class="btn btn-sm" onclick="exportCSV('${moduleKey}')">Export CSV</button>` : '';

  let tableHtml;
  if(records.length===0 && (DB[moduleKey]||[]).length===0){
    tableHtml = `<div class="empty-state"><div class="glyph">${mod.icon}</div>
      <div class="msg">${mod.emptyMsg}</div>
      <button class="btn btn-gold" onclick="openModal('${moduleKey}')">+ Add ${mod.label.replace(/s$/,'')}</button>
    </div>`;
  } else if(records.length===0){
    tableHtml = `<div class="empty-state"><div class="msg">No records match your search or filter.</div></div>`;
  } else {
    const cols = mod.tableCols;
    tableHtml = `<div class="table-wrap"><table class="data">
      <thead><tr>${cols.map(c=>`<th>${mod.fields.find(f=>f.key===c).label}</th>`).join('')}<th></th></tr></thead>
      <tbody>${records.map(r=>renderRow(moduleKey,mod,cols,r)).join('')}</tbody>
    </table></div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-box small"><input placeholder="Search ${mod.label.toLowerCase()}..." value="${state.q}" oninput="setModuleSearch('${moduleKey}',this.value)"></div>
        ${filterHtml}
      </div>
      <div class="toolbar-left">${exportHtml}<span class="text-faint">${records.length} of ${(DB[moduleKey]||[]).length}</span></div>
    </div>
    <div class="panel">${tableHtml}</div>
  `;
}

function renderRow(moduleKey,mod,cols,r){
  const cells = cols.map(c=>{
    const f = mod.fields.find(f=>f.key===c);
    let val = r[c];

    // --- 1. Staff Name Overrides ---
    if((moduleKey === "payroll" || moduleKey === "advances") && c === "staff_id"){
        val = r.staffName;
    }
    
    // --- 2. Client Name Overrides ---
    if(moduleKey === "meetings" && c === "client_id"){
        val = r.title; // Meetings backend aliases client name as 'title'
    } else if((moduleKey === "invoices" || moduleKey === "payments" || moduleKey === "artworks") && c === "client_id"){
        val = r.client; 
    }
    
    // --- 3. Formatting ---
    if(c==='progress'){
      const p = Math.max(0,Math.min(100,Number(val)||0));
      return `<td><span class="progress-track"><span class="progress-fill" style="width:${p}%"></span></span>${p}%</td>`;
    }
    if(f && f.type === 'select'){
      const colorMap = (mod.statusColors && mod.statusColors[c]) || {};
      const cls = colorMap[val] || 'neutral';
      return `<td><span class="badge badge-${cls}">${val||'—'}</span></td>`;
    }
    if(f && f.money){ return `<td class="mono">${val?fmtMoney(val):'—'}</td>`; }
    if(f && f.type === 'date'){ return `<td>${fmtDate(val)}</td>`; }
    if(!val) return `<td class="text-faint">—</td>`;
    
    return `<td class="wrap">${escapeHtml(String(val))}</td>`;
  }).join('');

function escapeHtml(s) {
    // This safely converts anything (null, numbers, etc.) to a string before replacing
    return String(s || '').replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
}

function exportCSV(moduleKey){
  const mod = MODULES[moduleKey];
  const records = DB[moduleKey]||[];
  if(records.length===0){ alert('Nothing to export yet.'); return; }
  const headers = mod.fields.map(f=>f.label);
  const keys = mod.fields.map(f=>f.key);
  const rows = [headers.join(',')].concat(records.map(r=>keys.map(k=>{
    let v = r[k]==null? '' : String(r[k]).replace(/"/g,'""');
    if(v.includes(',')||v.includes('"')||v.includes('\n')) v = `"${v}"`;
    return v;
  }).join(',')));
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `meeraa_savla_${moduleKey}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function openModal(moduleKey, id=null){
  modalCtx = {moduleKey, id};
  const mod = MODULES[moduleKey];
  const record = id ? DB[moduleKey].find(r => Number(r.id) === Number(id)) : null;
  document.getElementById('modalTitle').textContent = (id?'Edit ':'Add ') + mod.label.replace(/s$/,'');
  document.getElementById('modalBody').innerHTML = mod.fields.filter(f=>!f.computed).map(f=>renderField(f,record)).join('');
  document.getElementById('modalOverlay').classList.add('active');
  if(mod.afterRenderModal) mod.afterRenderModal(record);
}
function fieldOptions(f){ return typeof f.options==='function' ? (f.options()||[]) : (f.options||[]); }
function renderField(f, record){

    const val = record ? (record[f.key] ?? '') : (f.default ?? '');

    const req = f.required ? 'required' : '';

    // Dynamic options support
    let opts = [];

    if(f.type === "select"){

        opts = typeof f.options === "function"
            ? f.options()
            : fieldOptions(f);

        return `
        <div class="field">

            <label>${f.label}${f.required ? " *" : ""}</label>

            <select id="f_${f.key}">

                ${
                    !val && !f.default
                        ? `<option value="">Select ${f.label}</option>`
                        : ""
                }

                ${
                    opts.map(o=>{

                        // Support object options
                        if(typeof o === "object"){

                            return `
                                <option
                                    value="${o.value}"
                                    ${String(val)===String(o.value)?"selected":""}
                                >
                                    ${o.label}
                                </option>
                            `;

                        }

                        // Old string options
                        return `
                            <option
                                value="${o}"
                                ${val===o?"selected":""}
                            >
                                ${o}
                            </option>
                        `;

                    }).join("")
                }

            </select>

        </div>
        `;

    }

    if(f.type === "textarea"){

        return `
        <div class="field">

            <label>${f.label}</label>

            <textarea
                id="f_${f.key}"
                placeholder="${f.placeholder || ""}"
            >${escapeHtml(String(val))}</textarea>

        </div>
        `;

    }

    return `
    <div class="field">

        <label>${f.label}${f.required ? " *" : ""}</label>

        <input
            id="f_${f.key}"
            type="${
                f.type==="number"
                ? "number"
                : f.type==="date"
                ? "date"
                : "text"
            }"
            value="${escapeHtml(String(val))}"
            placeholder="${f.placeholder || ""}"
            ${req}
        >

    </div>
    `;

}

async function onDropArtwork(e, col){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  
  const id = e.dataTransfer.getData('text/plain');
  const artwork = (DB.artworks || []).find(a => Number(a.id) === Number(id));

  if(artwork && artwork.status !== col){
    const oldStatus = artwork.status;
    artwork.status = col; // Optimistic UI update for instant snappiness
    renderTasksView();

    try {
      // 1. Send the updated status directly to MySQL!
      await fetch(`/api/artworks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(artwork)
      });
      
      // 2. Fetch the fresh database state just to be safe
      const response = await fetch("/api/artworks");
      DB.artworks = await response.json();
      
      toast(`Moved to ${col}`);
      
    } catch (err) {
      console.error(err);
      artwork.status = oldStatus; // Revert UI if the server crashed
      renderTasksView();
      alert("Failed to update artwork status in the database.");
    }
  }
}

/* ---------------- CASH BOOK / LEDGER ---------------- */
function buildLedgerEntries(){
  const entries = [];
  (DB.payments||[]).forEach(p=>{
    if(Number(p.amountPaid)>0){
      entries.push({
        date: p.paidDate || p.dueDate || '',
        type:'Income',
        desc: 'Payment — '+(p.client||'Client')+(p.artwork?' ('+p.artwork+')':''),
        amount: Number(p.amountPaid)||0
      });
    }
  });
  (DB.expenses||[]).forEach(e=>{
    entries.push({
      date: e.date || '',
      type:'Expense',
      desc: (e.category||'Expense')+(e.description?' — '+e.description:(e.vendor?' — '+e.vendor:'')),
      amount: -(Number(e.amount)||0)
    });
  });
  (SALARIES||[]).forEach(s=>{
    if(s.status==='Paid' && Number(s.net)>0){
      entries.push({
        date: s.paidDate || (s.month+'-01'),
        type:'Expense',
        desc: 'Salary — '+(s.staffName||'Staff')+' ('+monthLabel(s.month)+')',
        amount: -(Number(s.net)||0)
      });
    }
  });
  (DB.bills||[]).forEach(b=>{
    if(b.status==='Paid' && Number(b.amount)>0){
      entries.push({
        date: b.paidDate || b.dueDate || '',
        type:'Expense',
        desc: 'Bill — '+(b.name||b.category||'Payable')+(b.vendor?' ('+b.vendor+')':''),
        amount: -(Number(b.amount)||0)
      });
    }
  });
  (DB.advances||[]).forEach(a=>{
    if(Number(a.amount)>0){
      entries.push({
        date: a.date || '',
        type:'Expense',
        desc: 'Advance to '+(a.staffName||'Staff'),
        amount: -(Number(a.amount)||0)
      });
    }
  });
  entries.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  let running = 0;
  entries.forEach(e=>{ running += e.amount; e.balance = running; });
  return entries.reverse();
}
function renderLedger(){
  const entries = buildLedgerEntries();
  const totalIn = entries.filter(e=>e.amount>0).reduce((s,e)=>s+e.amount,0);
  const totalOut = entries.filter(e=>e.amount<0).reduce((s,e)=>s+Math.abs(e.amount),0);
  const balance = totalIn - totalOut;

  let tableHtml;
  if(entries.length===0){
    tableHtml = `<div class="empty-state"><div class="glyph">▥</div><div class="msg">No cash movement yet. Log a payment received or an expense to start the cash book.</div></div>`;
  } else {
    tableHtml = `<div class="table-wrap"><table class="data">
      <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Amount</th><th>Running Balance</th></tr></thead>
      <tbody>${entries.map(e=>`
        <tr>
          <td>${fmtDate(e.date)}</td>
          <td><span class="badge badge-${e.type==='Income'?'success':'danger'}">${e.type}</span></td>
          <td class="wrap">${escapeHtml(e.desc)}</td>
          <td class="mono" style="color:${e.amount<0?'var(--danger)':'var(--ok)'}">${e.amount<0?'−':'+'}${fmtMoney(Math.abs(e.amount))}</td>
          <td class="mono">${fmtMoney(e.balance)}</td>
        </tr>`).join('')}</tbody>
    </table></div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="grid grid-3" style="margin-bottom:16px;">
      <div class="metric-card"><div class="m-label">Total In</div><div class="m-value">${fmtMoney(totalIn)}</div><div class="m-sub up">from payments received</div></div>
      <div class="metric-card"><div class="m-label">Total Out</div><div class="m-value">${fmtMoney(totalOut)}</div><div class="m-sub down">from logged expenses</div></div>
      <div class="metric-card"><div class="m-label">Cash Balance</div><div class="m-value">${fmtMoney(balance)}</div><div class="m-sub ${balance<0?'down':'up'}">in minus out</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Cash Book — All Entries</h3><span class="text-faint">${entries.length} entries, most recent first</span></div>
      ${tableHtml}
    </div>
  `;
}

/* ---------------- PAYROLL / SALARY SYSTEM ---------------- */
function monthLabel(m){
  if(!m) return '';
  const [y,mo] = m.split('-');
  const d = new Date(Number(y), Number(mo)-1, 1);
  return d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
}
function getSalaryRecord(staffId, month){

    return (DB.payroll || []).find(

        p =>
            Number(p.staff_id) === Number(staffId) &&

            `${p.payroll_year}-${String(
                new Date(Date.parse(p.payroll_month +" 1, 2000")).getMonth()+1
            ).padStart(2,"0")}` === month

    );

}

function computeNet(base,bonus,ded,adv){ return Math.max(0,(Number(base)||0)+(Number(bonus)||0)-(Number(ded)||0)-(Number(adv)||0)); }

// active advances (outstanding>0) for a staff member, oldest first
function staffAdvances(staffId){
  return (DB.advances||[]).filter(a=>a.staffId===staffId && a.status!=='Closed' && (Number(a.outstanding)||0)>0)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
}
function staffOutstanding(staffId){ return staffAdvances(staffId).reduce((s,a)=>s+(Number(a.outstanding)||0),0); }
// suggested recovery this month = sum of per-month plans, capped at outstanding
function suggestedRecovery(staffId){
  const list = staffAdvances(staffId);
  const out = list.reduce((s,a)=>s+(Number(a.outstanding)||0),0);
  const plan = list.reduce((s,a)=>s+(Number(a.perMonth)||0),0);
  return Math.min(out, plan);
}
function applyAdvanceRecovery(staffId, amount){
  let remaining = Number(amount)||0; const applied=[];
  if(remaining<=0) return applied;
  for(const a of staffAdvances(staffId)){
    if(remaining<=0) break;
    const take = Math.min(remaining, Number(a.outstanding)||0);
    a.outstanding = (Number(a.outstanding)||0) - take;
    if(a.outstanding<=0){ a.outstanding=0; a.status='Closed'; }
    remaining -= take; applied.push({id:a.id, amount:take});
  }
  persist('advances');
  return applied;
}
function reverseAdvanceRecovery(applied){
  if(!applied || !applied.length) return;
  applied.forEach(x=>{
    const a = (DB.advances||[]).find(y=>y.id===x.id);
    if(a){ a.outstanding = (Number(a.outstanding)||0) + (Number(x.amount)||0); if(a.outstanding>0) a.status='Active'; }
  });
  persist('advances');
}

// read the editable inputs for a row from the DOM
function readPayrollRow(staffId){
  const g = id => { const el=document.getElementById(id); return el?(Number(el.value)||0):null; };
  return {
    base: g('pay_base_'+staffId) ?? 0,
    bonus: g('pay_bonus_'+staffId) ?? 0,
    deductions: g('pay_ded_'+staffId) ?? 0,
    advance: g('pay_adv_'+staffId) ?? 0,
  };
}
function recalcRow(staffId){
  const {base,bonus,deductions,advance} = readPayrollRow(staffId);
  const cell = document.getElementById('net_'+staffId);
  if(cell) cell.textContent = fmtMoney(computeNet(base,bonus,deductions,advance));
  recalcPayrollTotals();
}
function recalcPayrollTotals(){
  const active = (DB.staff||[]).filter(s=>s.status==='Active');
  let payable=0, paid=0, pending=0;
  active.forEach(s=>{
    const rec = getSalaryRecord(s.id, payrollMonth);
    let net;
    if(rec && rec.status==='Paid'){ net = rec.net; paid += net; }
    else { const r = readPayrollRow(s.id); net = computeNet(r.base,r.bonus,r.deductions,r.advance); pending += net; }
    payable += net;
  });
  const set = (id,v)=>{ const el=document.getElementById(id); if(el) el.textContent = fmtMoney(v); };
  set('pr_payable', payable); set('pr_paid', paid); set('pr_pending', pending);
}
function persistRow(staffId){
  const {base,bonus,deductions,advance} = readPayrollRow(staffId);
  upsertSalary(staffId, {base,bonus,deductions,advance});
  recalcPayrollTotals();
}

async function paySalary(staffId){

    const staff = DB.staff.find(
        s => Number(s.id) === Number(staffId)
    );

    if(!staff) return;

    const {

        base,
        bonus,
        deductions,
        advance

    } = readPayrollRow(staffId);

    const net = computeNet(

        base,

        bonus,

        deductions,

        advance

    );

    const d = new Date(payrollMonth + "-01");

    const monthName = d.toLocaleString("default",{

        month:"long"

    });

    const year = d.getFullYear();

    const existing = getSalaryRecord(staffId,payrollMonth);

    const payload = {

        staff_id: staffId,

        payroll_month: monthName,

        payroll_year: year,

        basic_salary: base,

        advance_deduction: advance,

        bonus: bonus,

        deduction: deductions,

        net_salary: net,

        payment_date: todayStr(),

        payment_mode: staff.paymentMode,

        status:"Paid",

        notes:""

    };

    try{

        if(existing){

            await fetch(

                `/api/payroll/${existing.id}`,

                {

                    method:"PUT",

                    headers:{

                        "Content-Type":"application/json"

                    },

                    body:JSON.stringify(payload)

                }

            );

        }else{

            await fetch(

                "/api/payroll",

                {

                    method:"POST",

                    headers:{

                        "Content-Type":"application/json"

                    },

                    body:JSON.stringify(payload)

                }

            );

        }

        const response = await fetch(

            "/api/payroll"

        );

        DB.payroll = await response.json();

        toast("Salary Paid");

        renderPayroll();

    }

    catch(err){

        console.error(err);

        alert("Unable to save payroll.");

    }

}

function unpaySalary(staffId){
  const rec = getSalaryRecord(staffId, payrollMonth);
  if(rec && rec.advanceApplied){ reverseAdvanceRecovery(rec.advanceApplied); }
  upsertSalary(staffId, {status:'Unpaid',paidDate:'',advanceApplied:[]});
  renderPayroll();
}
function payAllSalaries(){
  const active = (DB.staff||[]).filter(s=>s.status==='Active');
  const unpaid = active.filter(s=>{ const r=getSalaryRecord(s.id,payrollMonth); return !r || r.status!=='Paid'; });
  if(unpaid.length===0){ toast('Everyone is already paid for '+monthLabel(payrollMonth)); return; }
  if(!confirm('Mark all '+unpaid.length+' unpaid salaries as PAID for '+monthLabel(payrollMonth)+'? Any advance recovery shown will be applied.')) return;
  unpaid.forEach(s=>{
    const {base,bonus,deductions,advance} = readPayrollRow(s.id);
    const cappedAdv = Math.min(advance, staffOutstanding(s.id));
    const applied = applyAdvanceRecovery(s.id, cappedAdv);
    upsertSalary(s.id, {base,bonus,deductions,advance:cappedAdv,advanceApplied:applied,status:'Paid',paidDate:todayStr()});
  });
  toast(unpaid.length+' salaries paid for '+monthLabel(payrollMonth));
  renderPayroll();
}

function exportSalariesCSV(){
  if((SALARIES||[]).length===0){ alert('No salary records to export yet.'); return; }
  const headers = ['Staff','Month','Base','Bonus','Deductions','Advance','Net','Status','Paid Date','Mode'];
  const rows = [headers.join(',')].concat(SALARIES.map(s=>[
    s.staffName, s.month, s.base, s.bonus, s.deductions, s.advance||0, s.net, s.status, s.paidDate||'', s.mode||''
  ].map(v=>{ let x=v==null?'':String(v).replace(/"/g,'""'); return /[",\n]/.test(x)?`"${x}"`:x; }).join(',')));
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='meeraa_savla_salaries.csv';

}

let toastTimer = null;

  let el = document.getElementById('toast');
  if(!el){ el = document.createElement('div'); el.id='toast'; el.className='toast'; document.body.appendChild(el); }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2400);
}

function wireGlobalUX(){
  // Click on dark backdrop closes the modal
  const mo = document.getElementById('modalOverlay');
  mo.addEventListener('mousedown', e=>{ if(e.target===mo) closeModal(); });
  const io = document.getElementById('invoiceOverlay');
  io.addEventListener('mousedown', e=>{ if(e.target===io) closeInvoiceDoc(); });
  // Keyboard: Esc closes, Enter saves (except inside a textarea)
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape'){ if(anyModalOpen()) closeModal(); else if(invoiceOpen()) closeInvoiceDoc(); }
    if(e.key==='Enter' && anyModalOpen() && e.target.tagName!=='TEXTAREA'){ e.preventDefault(); saveModal(); }
  });
}

function backupPayload(){
  const dump = { app:'meeraa-savla-os', version:1, exportedAt:new Date().toISOString(), data:{} };
  Object.keys(MODULES).forEach(k=> dump.data[k] = DB[k]||[]);
  dump.data.tasks = TASKS;
  dump.data.salaries = SALARIES;
  return dump;
}
function exportAllData(){
  const blob = new Blob([JSON.stringify(backupPayload(),null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'meeraa_savla_backup_'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Backup downloaded');
}
function triggerImport(){ document.getElementById('importFile').click(); }
function handleImportFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let dump;
    try { dump = JSON.parse(reader.result); }
    catch(e){ alert('That file is not a valid backup (could not read JSON).'); input.value=''; return; }
    if(!dump || dump.app!=='meeraa-savla-os' || !dump.data){
      alert('That does not look like a Meeraa Savla backup file.'); input.value=''; return;
    }
    if(!confirm('Restore this backup? It will REPLACE all current data in this app. Consider exporting a backup first.')){ input.value=''; return; }
    Object.keys(MODULES).forEach(k=>{ DB[k] = Array.isArray(dump.data[k]) ? dump.data[k] : []; persist(k); });
    TASKS = Array.isArray(dump.data.tasks) ? dump.data.tasks : []; persist('tasks');
    SALARIES = Array.isArray(dump.data.salaries) ? dump.data.salaries : []; persist('salaries');
    input.value='';
    toast('Backup restored');
    renderNav(); renderTopbar(); renderContent();
  };
  reader.readAsText(file);
}

    </div>
    <div class="panel">
      <div class="panel-head"><h3>What's stored right now</h3><span class="text-faint">${totalRecords} records total</span></div>
      <div class="table-wrap"><table class="data">
        <thead><tr><th>Section</th><th>Records</th></tr></thead>
        <tbody>${counts.map(c=>`<tr><td>${c.label}</td><td class="mono">${c.n}</td></tr>`).join('')}</tbody>
      </table></div>
    </div>
  `;
}

/* ---------------- ROUTER ---------------- */
function renderContent(){
  if(currentView==='dashboard') return renderDashboard();
  if(currentView==='tasks') return renderTasksView();
  if(currentView==='analytics') return renderAnalytics();
  if(currentView==='ledger') return renderLedger();
  if(currentView==='payroll') return renderPayroll();
  if(currentView==='backup') return renderBackup();
  return renderModuleView(currentView);
}

/* ---------------- INIT ---------------- */
async function init(){
  document.getElementById('content').innerHTML = `<div class="text-faint" style="padding:40px;">Loading workspace…</div>`;
  await loadAll();
  renderNav();
  renderTopbar();
  renderContent();
  wireGlobalUX();
}
init();

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  sidebar.classList.toggle('active');
}

// Optional: Close sidebar when clicking a nav item on mobile
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    if (window.innerWidth <= 880) {
      document.querySelector('.sidebar').classList.remove('active');
    }
  });
});
</script>
</body>
</html>
